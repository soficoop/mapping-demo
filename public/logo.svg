<svg viewBox="0 0 450 100" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <style>
    .text-title {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 800;
      font-size: 32px;
      fill: #292524;
      letter-spacing: -0.04em;
    }
    .text-subtitle {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 600;
      font-size: 11px;
      fill: #78716C;
      letter-spacing: 0.15em;
    }
    @media (prefers-color-scheme: dark) {
      .text-title {
        fill: #FAFAFD !important;
      }
      .text-subtitle {
        fill: #A8A29E !important;
      }
    }
  </style>

  <defs>
    <!-- Soft, deep physical shadows for layered clay relief appearance -->
    <filter id="clay-shadow-deep" x="-25%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#1F0B02" flood-opacity="0.25" />
    </filter>
    <filter id="clay-shadow-mid" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#3A1709" flood-opacity="0.2" />
    </filter>
    <filter id="clay-shadow-soft" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#3A1709" flood-opacity="0.15" />
    </filter>
    <filter id="pin-shadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#1A0D05" flood-opacity="0.3" />
    </filter>

    <!-- Clay Material Gradients -->
    <linearGradient id="clay-base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2875E" />
      <stop offset="60%" stop-color="#CA6B41" />
      <stop offset="100%" stop-color="#A54B25" />
    </linearGradient>

    <linearGradient id="clay-level-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EFA782" />
      <stop offset="100%" stop-color="#D57B52" />
    </linearGradient>

    <linearGradient id="clay-level-2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4C2A3" />
      <stop offset="100%" stop-color="#DE8E66" />
    </linearGradient>

    <linearGradient id="clay-level-3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCE1CD" />
      <stop offset="100%" stop-color="#E9AA84" />
    </linearGradient>

    <linearGradient id="clay-water" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#80ABB3" />
      <stop offset="50%" stop-color="#55828B" />
      <stop offset="100%" stop-color="#35565C" />
    </linearGradient>

    <radialGradient id="clay-pin-yellow" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFE38E" />
      <stop offset="40%" stop-color="#F4B23E" />
      <stop offset="100%" stop-color="#C27A0B" />
    </radialGradient>

    <radialGradient id="clay-pin-teal" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#A9E2D9" />
      <stop offset="45%" stop-color="#4FA196" />
      <stop offset="100%" stop-color="#246057" />
    </radialGradient>

    <linearGradient id="carve-dark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#602B15" />
      <stop offset="100%" stop-color="#833C1F" />
    </linearGradient>
  </defs>

  <!-- ICON GROUP (Translated & scaled down to fit beautiful 80x80 box) -->
  <g transform="translate(10, 10) scale(0.156)">
    <!-- 1. Base clay tile under-edge and main surface -->
    <path d="M 115,58 Q 256,53 397,58 Q 472,128 467,272 Q 472,416 397,486 Q 256,491 115,486 Q 40,416 45,272 Q 40,128 115,58 Z" fill="#753018" />
    <path d="M 115,44 Q 256,39 397,44 Q 472,114 467,258 Q 472,402 397,472 Q 256,477 115,472 Q 40,402 45,258 Q 40,114 115,44 Z" fill="url(#clay-base)" filter="url(#clay-shadow-deep)" />

    <!-- 2. Blue clay water path -->
    <path d="M 45,200 C 130,195 180,240 210,290 C 240,340 180,410 240,445 C 270,462 310,440 330,474"
          fill="none" stroke="url(#clay-water)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" filter="url(#clay-shadow-soft)" />
    <path d="M 50,200 C 130,195 180,240 210,290 C 240,340 180,410 240,445 C 265,460 300,443 325,472"
          fill="none" stroke="#A7CCD3" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.4" />

    <!-- 3. Topo elevation 1 -->
    <path d="M 180,140 C 240,105 320,95 385,110 C 445,125 450,190 435,265 C 420,340 340,400 270,390 C 215,380 180,335 170,285 C 160,235 125,170 180,140 Z"
          fill="url(#clay-level-1)" filter="url(#clay-shadow-mid)" />

    <!-- 4. Topo elevation 2 -->
    <path d="M 235,165 C 275,140 340,135 380,165 C 415,190 405,255 375,300 C 345,340 280,345 250,310 C 220,280 205,200 235,165 Z"
          fill="url(#clay-level-2)" filter="url(#clay-shadow-soft)" />

    <!-- 5. Topo elevation 3 peak -->
    <path d="M 285,185 C 315,170 350,180 360,205 C 370,230 345,270 315,260 C 285,250 265,205 285,185 Z"
          fill="url(#clay-level-3)" filter="url(#clay-shadow-soft)" />

    <!-- 6. Stylus route trail -->
    <path d="M 120,110 Q 230,120 250,205 T 390,340"
          fill="none" stroke="url(#carve-dark)" stroke-width="8" stroke-linecap="round" stroke-dasharray="1, 16" />
    <path d="M 120,110 Q 230,120 250,205 T 390,340"
          fill="none" stroke="#FFE9DF" stroke-width="4" stroke-linecap="round" stroke-dasharray="1, 16" opacity="0.3" transform="translate(1, 2)" />

    <!-- 7. Molded pins -->
    <!-- Teal pin -->
    <g transform="translate(250, 205)" filter="url(#pin-shadow)">
      <path d="M 0,0 C -12,-12 -16,-24 -16,-32 C -16,-41 -8,-48 1,-48 C 10,-48 18,-41 18,-32 C 18,-24 14,-12 0,0 Z" fill="url(#clay-pin-teal)" />
      <circle cx="1" cy="-32" r="5" fill="#FCE1CD" />
    </g>

    <!-- Yellow pin -->
    <g transform="translate(315, 260) scale(0.85)" filter="url(#pin-shadow)">
      <path d="M 0,0 C -12,-12 -16,-24 -16,-32 C -16,-41 -8,-48 1,-48 C 10,-48 18,-41 18,-32 C 18,-24 14,-12 0,0 Z" fill="url(#clay-pin-yellow)" />
      <circle cx="1" cy="-32" r="5" fill="#FFEFE5" />
    </g>

    <!-- Top edge highlights -->
    <path d="M 115,46 Q 256,41 397,46" fill="none" stroke="#FFF" stroke-width="5" stroke-linecap="round" opacity="0.25" filter="blur(2px)" />
  </g>

  <!-- TYPOGRAPHY WORDMARK -->
  <text x="110" y="48" class="text-title">Clayground</text>
  <text x="112" y="71" class="text-subtitle">MAPPING PLAYGROUND</text>
</svg>
